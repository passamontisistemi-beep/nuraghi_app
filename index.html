<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Nuraghi Sardegna</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
</head>
<body class="bg-[#0f172a] text-white min-h-screen p-6">
<div class="max-w-6xl mx-auto space-y-8">

<section class="text-center py-8">
<h1 class="text-5xl md:text-6xl font-bold text-amber-300">
Nuraghi di Sardegna
</h1>
<p class="text-slate-300 mt-4 text-xl max-w-3xl mx-auto">
Un ecosistema digitale per valorizzare nuraghi, comuni, turismo, giovani e candidatura UNESCO.
</p>
</section>

<div class="grid md:grid-cols-2 gap-6">

<div class="bg-slate-900 rounded-3xl p-6 shadow-2xl">
<h2 class="text-2xl font-bold text-amber-300 mb-4">Apri la WebApp</h2>
<p class="text-slate-300 mb-6">
Accedi alla mappa interattiva con comuni e nuraghi geolocalizzati.
</p>

<a href="app.html"
class="inline-block px-6 py-3 rounded-2xl bg-amber-300 text-black font-bold">
Apri App
</a>
</div>

<div class="bg-slate-900 rounded-3xl p-6 shadow-2xl text-center">
<canvas id="qr"></canvas>
<p class="mt-4 text-slate-400">
Scansiona il QR Code per aprire l'app
</p>
</div>

</div>

<footer class="pt-8 text-center text-slate-400 border-t border-slate-800">
<span class="font-bold">PASSAMONTI</span> COMMUNICATION
</footer>

</div>

<script>
const fullUrl = window.location.origin + window.location.pathname.replace("index.html","") + "app.html";
QRCode.toCanvas(document.getElementById("qr"), fullUrl, {width:220});
</script>
</body>
</html>
