<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>I Giganti della Sardegna</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
html,body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
font-family:Arial,sans-serif;
background:#08111f;
}
#map{position:fixed;inset:0;z-index:1;}

.top{
position:fixed;top:10px;left:10px;right:10px;z-index:999;
display:flex;flex-direction:column;gap:8px;
}
.title{
background:rgba(8,17,31,.92);
color:#fcd34d;
font-size:22px;
font-weight:800;
text-align:center;
padding:12px;
border-radius:18px;
}
.menu{
display:flex;gap:8px;justify-content:center;flex-wrap:wrap;
}
.ctrl{
background:rgba(60,35,10,.92);
color:#fff;
border:none;
padding:10px 14px;
border-radius:14px;
font-size:14px;
text-decoration:none;
}

.bottom{
position:fixed;left:10px;right:10px;bottom:10px;z-index:999;
display:flex;flex-direction:column;gap:8px;
}
.rss,.logo{
background:rgba(8,17,31,.92);
color:#fff;
padding:10px;
border-radius:14px;
text-align:center;
font-size:13px;
}
.rss{
overflow:hidden;white-space:nowrap;
}
.rss span{
display:inline-block;
padding-left:100%;
animation:scroll 35s linear infinite;
}
@keyframes scroll{
0%{transform:translateX(0)}
100%{transform:translateX(-100%)}
}
</style>
</head>

<body>

<div class="top">
<div class="title">I Giganti della Sardegna</div>

<div class="menu">
<a href="index.html" class="ctrl">Home</a>

<select id="area" class="ctrl">
<option value="all">Seleziona area</option>
<option value="nord">Nord</option>
<option value="centro">Centro</option>
<option value="sud">Sud</option>
</select>

<button id="gpsBtn" class="ctrl">GPS 100km</button>
<a href="mailto:info@cooperativa.it" class="ctrl">Dagli voce</a>
</div>
</div>

<div id="map"></div>

<div class="bottom">
<div class="rss">
<span>Nuraghi • Domus de Janas • Borghi • Comuni • Turismo • Cultura • Sardegna •</span>
</div>
<div class="logo"><strong>PASSAMONTI</strong>_COMMUNICATION</div>
</div>

<script>
const map=L.map('map',{zoomControl:false}).setView([40.05,9.0],8);

/* MAPPA PIÙ BELLA */
L.tileLayer(
'https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png',
{maxZoom:19,attribution:'© OpenStreetMap'}
).addTo(map);

const punti=[
["Su Nuraxi",39.704,9.004,"#ef4444","sud"],
["Arrubiu",39.693,9.250,"#ef4444","sud"],
["Santu Antine",40.504,8.773,"#ef4444","nord"],
["Losa",40.126,8.847,"#ef4444","centro"],

["Anghelu Ruju",40.627,8.319,"#f59e0b","nord"],
["Montessu",39.124,8.665,"#f59e0b","sud"],

["Bosa",40.300,8.500,"#10b981","centro"],
["Castelsardo",40.920,8.710,"#10b981","nord"],

["Cagliari",39.223,9.121,"#3b82f6","sud"],
["Nuoro",40.321,9.330,"#3b82f6","centro"]
];

let layers=[];

function draw(f="all"){
layers.forEach(x=>map.removeLayer(x));
layers=[];

punti.forEach((p,i)=>{
if(f!="all" && p[4]!=f)return;

const lat=p[1]+(i%2)*0.02;
const lon=p[2]+(i%3)*0.02;

const m=L.circleMarker([lat,lon],{
radius:9,
color:p[3],
fillColor:p[3],
fillOpacity:1,
weight:2
}).addTo(map);

m.bindPopup("<b>"+p[0]+"</b>");
layers.push(m);
});
}
draw();

document.getElementById("area").onchange=e=>draw(e.target.value);

function distKm(a,b,c,d){
const R=6371;
const dLat=(c-a)*Math.PI/180;
const dLon=(d-b)*Math.PI/180;
const x=Math.sin(dLat/2)**2+
Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*
Math.sin(dLon/2)**2;
return 2*R*Math.asin(Math.sqrt(x));
}

document.getElementById("gpsBtn").onclick=()=>{
navigator.geolocation.getCurrentPosition(pos=>{
const lat=pos.coords.latitude;
const lon=pos.coords.longitude;

const vicini=punti.filter(p=>distKm(lat,lon,p[1],p[2])<=100);

layers.forEach(x=>map.removeLayer(x));
layers=[];

vicini.forEach(p=>{
const m=L.circleMarker([p[1],p[2]],{
radius:10,color:p[3],fillColor:p[3],fillOpacity:1
}).addTo(map).bindPopup("<b>"+p[0]+"</b>");
layers.push(m);
});

if(vicini.length){
const g=L.featureGroup(vicini.map(v=>L.marker([v[1],v[2]])));
map.fitBounds(g.getBounds().pad(.4));
}
});
};
</script>

</body>
</html>
