<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>I Giganti della Sardegna</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
html,body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
background:#0f172a;
font-family:Arial, sans-serif;
}

#map{
height:100vh;
width:100vw;
z-index:1;
}

.leaflet-container{
background:#0f172a;
}

.top-wrap{
position:fixed;
top:10px;
left:12px;
right:12px;
z-index:999;
display:flex;
flex-direction:column;
gap:8px;
}

.title-box{
background:rgba(15,23,42,.92);
padding:10px 14px;
border-radius:16px;
text-align:center;
font-size:22px;
font-weight:800;
color:#fcd34d;
}

.panel{
display:flex;
gap:8px;
flex-wrap:wrap;
justify-content:center;
}

.control{
background:rgba(15,23,42,.92);
color:white;
border:none;
padding:10px 14px;
border-radius:16px;
font-size:14px;
text-decoration:none;
}

.bottom{
position:fixed;
left:12px;
right:12px;
bottom:12px;
z-index:999;
display:flex;
flex-direction:column;
gap:8px;
}

.rss{
overflow:hidden;
white-space:nowrap;
background:rgba(15,23,42,.92);
padding:10px;
border-radius:16px;
color:#cbd5e1;
font-size:14px;
}

.rss span{
display:inline-block;
padding-left:100%;
animation:scroll 48s linear infinite;
}

@keyframes scroll{
0%{transform:translateX(0)}
100%{transform:translateX(-100%)}
}

.logo{
text-align:center;
font-size:13px;
color:#94a3b8;
background:rgba(15,23,42,.92);
padding:10px;
border-radius:16px;
}

.place-title{
font-family:Arial, sans-serif;
font-size:16px;
font-weight:700;
color:#111827;
margin-bottom:6px;
}

.popup-link{
display:block;
font-size:12px;
color:#475569;
margin-top:3px;
text-decoration:underline;
}
</style>
</head>

<body>

<div class="top-wrap">

<div class="title-box">
I Giganti della Sardegna
</div>

<div class="panel">

<a href="index.html" class="control">Home</a>

<select id="area" class="control">
<option value="all">Seleziona area</option>
<option value="cagliari">Cagliari</option>
<option value="sassari">Sassari</option>
<option value="nuoro">Nuoro</option>
<option value="oristano">Oristano</option>
<option value="sud sardegna">Sud Sardegna</option>
</select>

<a
href="mailto:info@cooperativa.it?subject=Dagli Voce - Customer Satisfaction"
class="control">
Dagli voce
</a>

</div>
</div>

<div id="map"></div>

<div class="bottom">

<div class="rss">
<span>
Questo spazio è riservato alla pubblicazione delle informazioni sul patrimonio enogastronomico di quell'area e le ultime notizie ed eventi acquisite dal sito AGID dei comuni limitrofi •
</span>
</div>

<div class="logo">
<strong>PASSAMONTI</strong> COMMUNICATION
</div>

</div>

<script>
const map = L.map('map',{
zoomControl:false,
dragging:false,
touchZoom:false,
doubleClickZoom:false,
scrollWheelZoom:false,
boxZoom:false,
keyboard:false,
tap:true
});

const bounds = L.latLngBounds(
[38.75,7.95],
[41.35,10.10]
);

map.fitBounds(bounds);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{ attribution:'© OpenStreetMap' }
).addTo(map);

const comuni = [
['Cagliari',39.2238,9.1217,'cagliari'],
['Quartu Sant Elena',39.241,9.184,'cagliari'],
['Sassari',40.7267,8.5597,'sassari'],
['Alghero',40.557,8.319,'sassari'],
['Torralba',40.516,8.768,'sassari'],
['Nuoro',40.3211,9.3308,'nuoro'],
['Dorgali',40.292,9.588,'nuoro'],
['Oristano',39.9036,8.5920,'oristano'],
['Cabras',39.930,8.533,'oristano'],
['Abbasanta',40.126,8.820,'oristano'],
['Barumini',39.705,9.005,'sud sardegna'],
['Carbonia',39.167,8.522,'sud sardegna'],
['Iglesias',39.309,8.537,'sud sardegna']
];

const nuraghi = [
['Su Nuraxi',39.704,9.002,'sud sardegna'],
['Santu Antine',40.504,8.773,'sassari'],
['Losa',40.126,8.847,'oristano'],
['Arrubiu',39.495,9.230,'sud sardegna'],
['Palmavera',40.596,8.285,'sassari'],
['Genna Maria',39.645,8.969,'sud sardegna'],
['Majori',41.079,9.176,'sassari'],
['Seruci',39.255,8.518,'sud sardegna'],
['Nolza',39.540,9.270,'sud sardegna'],
['Aiga',40.210,9.110,'nuoro'],
['Oes',40.470,8.930,'sassari'],
['Is Paras',39.670,8.950,'oristano']
];

let layers=[];

function popupComune(nome){
return `
<div class="place-title">${nome}</div>
<a class="popup-link" target="_blank"
href="https://it.wikipedia.org/wiki/${encodeURIComponent(nome)}">Wikipedia</a>
<a class="popup-link" target="_blank"
href="https://it.wikivoyage.org/wiki/${encodeURIComponent(nome)}">Wikivoyage</a>
<a class="popup-link" target="_blank"
href="https://www.wikiloc.com/wikiloc/find.do?q=${encodeURIComponent(nome)}">Wikiloc</a>
`;
}

function popupNuraghe(nome){
return `
<div class="place-title">${nome}</div>
<a class="popup-link" target="_blank"
href="https://it.wikipedia.org/wiki/${encodeURIComponent(nome)}">Wikipedia</a>
`;
}

function draw(filter='all'){
layers.forEach(l=>map.removeLayer(l));
layers=[];

comuni.forEach(c=>{
if(filter!=='all' && c[3]!==filter) return;

const m=L.circleMarker([c[1],c[2]],{
radius:6,
color:'#3b82f6',
fillColor:'#3b82f6',
fillOpacity:1
}).addTo(map).bindPopup(popupComune(c[0]));

layers.push(m);
});

nuraghi.forEach(n=>{
if(filter!=='all' && n[3]!==filter) return;

const m=L.circleMarker([n[1],n[2]],{
radius:11,
color:'#ef4444',
fillColor:'#ef4444',
fillOpacity:1
}).addTo(map).bindPopup(popupNuraghe(n[0]));

layers.push(m);
});
}

draw();

document.getElementById('area').onchange=(e)=>{
draw(e.target.value);
};
</script>

</body>
</html>
