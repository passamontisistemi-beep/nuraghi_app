<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>I Giganti della Sardegna</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#111;color:#fff;display:flex;justify-content:center}
.phone{width:260px;background:#1b1b1b}
.header{background:#20304a;padding:14px;text-align:center;font-weight:bold;font-size:14px}
.nav{display:flex;background:#3b2b1d;color:#f5d08a;font-size:12px}
.nav div{padding:6px 8px;border-right:1px solid #6b553d}.nav .flag{margin-left:auto}
.map{position:relative;background:#cfe8ef;height:520px;overflow:hidden}
.map img{width:100%;height:100%;object-fit:cover;opacity:.9}
.dot,.ring{position:absolute;width:12px;height:12px;border-radius:50%;transform:translate(-50%,-50%)}
.dot.red{background:#e74c3c}.dot.green{background:#2ecc71}.dot.orange{background:#f39c12}.dot.blue{background:#3498db}
.ring{border:2px solid #fff;background:transparent}
.footer{background:#222;padding:8px;text-align:center;font-size:11px}
</style>
</head><body><div class='phone'>
<div class='header'>I Giganti della Sardegna</div>
<div class='nav'><div>Home</div><div>Seleziona area</div><div class='flag'>🇮🇹</div></div>
<div class='map'>
<img src='https://upload.wikimedia.org/wikipedia/commons/thumb/3/3f/Sardinia_relief_location_map.jpg/512px-Sardinia_relief_location_map.jpg'>
<div class='dot red' style='left:65%;top:18%'></div>
<div class='dot green' style='left:30%;top:25%'></div>
<div class='dot blue' style='left:78%;top:38%'></div>
<div class='dot orange' style='left:48%;top:48%'></div>
<div class='dot red' style='left:60%;top:63%'></div>
<div class='dot green' style='left:25%;top:70%'></div>
<div class='dot orange' style='left:40%;top:82%'></div>
<div class='ring' style='left:68%;top:20%'></div>
<div class='ring' style='left:34%;top:27%'></div>
<div class='ring' style='left:62%;top:65%'></div>
<div class='ring' style='left:42%;top:84%'></div>
</div>
<div class='footer'>Ultime notizie ed eventi dei comuni limitrofi</div>
</div></body></html>
