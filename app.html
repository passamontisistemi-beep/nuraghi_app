<!DOCTYPE html><html lang='it'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Nuraghi App</title><script src='https://cdn.tailwindcss.com'></script></head><body class='bg-[#0f172a] text-white min-h-screen p-4'><div class='max-w-6xl mx-auto space-y-6'><header class='flex justify-between items-center'><h1 class='text-4xl font-bold'>PASSAMONTI <span class='font-normal'>COMMUNICATION</span></h1><a href='index.html' class='px-4 py-2 rounded-2xl bg-amber-300 text-black'>Home</a></header><div class='grid md:grid-cols-2 gap-6'><div class='relative bg-slate-800 rounded-3xl aspect-[7/10] p-4'><div class='absolute inset-6 rounded-[45%_55%_50%_60%/50%_45%_55%_50%] bg-gradient-to-br from-stone-400 via-stone-500 to-stone-700'></div><button onclick="showNuraghe('Su Nuraxi','Barumini, UNESCO, complesso simbolo della Sardegna')" class='absolute left-[42%] top-[55%] w-8 h-8 rounded-full bg-amber-300 text-black font-bold'>N</button><button onclick="showNuraghe('Santu Antine','Torralba, uno dei più grandi nuraghi dell’isola')" class='absolute left-[55%] top-[38%] w-8 h-8 rounded-full bg-amber-300 text-black font-bold'>N</button><div title='Barumini' class='absolute left-[48%] top-[60%] w-4 h-4 rounded-full bg-emerald-400'></div><div title='Torralba' class='absolute left-[61%] top-[41%] w-4 h-4 rounded-full bg-emerald-400'></div></div><div id='panel' class='bg-slate-800 rounded-3xl p-6'><h2 class='text-2xl font-bold text-amber-300'>Seleziona un Nuraghe</h2><p class='text-slate-300 mt-3'>Tocca un simbolo N sulla mappa.</p></div></div><div class='flex gap-3 flex-wrap'><button onclick='speak()' class='px-4 py-2 rounded-2xl bg-amber-300 text-black'>Voce</button><button onclick='gps()' class='px-4 py-2 rounded-2xl bg-slate-700'>GPS</button><a href='mailto:info@cooperativa.it?subject=Feedback Nuraghi' class='px-4 py-2 rounded-2xl bg-slate-700'>Feedback</a></div></div><script>let current='Benvenuto nella app Nuraghi';function showNuraghe(n,d){current=n+'. '+d;document.getElementById('panel').innerHTML=`<h2 class="text-2xl font-bold text-amber-300">${n}</h2><p class="mt-3 text-slate-300">${d}</p><div class="mt-4 flex gap-3"><a target="_blank" href="https://it.wikipedia.org/wiki/${encodeURIComponent(n)}" class="text-red-400">Wikipedia +</a><a target="_blank" href="https://www.wikiloc.com" class="text-emerald-400">Wikiloc</a></div>`;}function speak(){speechSynthesis.speak(new SpeechSynthesisUtterance(current));}function gps(){navigator.geolocation?.getCurrentPosition(p=>alert('Lat '+p.coords.latitude.toFixed(4)+' Lon '+p.coords.longitude.toFixed(4)));}</script></body></html>
